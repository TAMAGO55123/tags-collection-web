<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>タグコレ | タグサーバーをまとめる掲示板</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="タグコレ | タグサーバーをまとめる掲示板">
        <meta property="og:description" content="β版公開。">
        <meta property="og.url" content="https://tags-collection-web.pages.dev/">

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@100;300;400;500;700;800;900&display=swap" rel="stylesheet">
        <style>*{font-family: "M PLUS Rounded 1c", sans-serif}</style>

        <!-- Favicon package generated by Favicon.im Generator -->
        <link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="192x192" href="/favicons/android-chrome-192x192.png">
        <link rel="icon" type="image/png" sizes="512x512" href="/favicons/android-chrome-512x512.png">
        <meta name="theme-color" content="#ffffff">

        <link rel="stylesheet" href="/index.css">
        <script src="/func.js"></script>
        <script src="/invite.js"></script>
        <script src="/card.js"></script>
    </head>
    <body>
        <!-- 上部バー -->
        <div class="topbar d-flex align-items-center">
            <img src="/img/icon.png" alt="Main Icon" id="main-icon">
            <h3 class="m-0" id="title">タグコレ</h3>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <div class="hover-wrapper">
                    <a href="https://discord.com/oauth2/authorize?client_id=1464887286196867205" class="btn btn-outline-light bot-add-btn"><i class="bi bi-box-arrow-right"></i></a>
                    <p class="bot-add-hover-txt p-2 border rounded">Botをサーバーに追加する</p>
                </div>
                <input type="text" class="form-control search-box" id="search-box" placeholder="サーバーを検索...">
            </div>
        </div>
        <h2 style="color: red;">※βなので鯖は適当です</h2>

        <!-- カテゴリ -->
        <div class="p-3 " id="cat">
            分類
            <button class="category-btn active" value="all">すべて</button>
            <button class="category-btn" value="normal">通常</button>
            <button class="category-btn" value="request">参加申請</button>
        </div>
        <!-- カテゴリ -->
        <div class="p-3" id="lang-cat">
            言語
            <button class="category-btn active" value="all">すべて</button>
            <button class="category-btn" value="Japanese">日本語</button>
            <button class="category-btn" value="English">英語</button>
            <button class="category-btn" value="Chinese">中国語</button>
        </div>

        <!-- サーバー一覧 -->
        <div class="container">
            <div class="row g-4 servers row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4"></div>
        </div>
        <p id="here-nothing" class="text-center d-none"><br>ここには何もありません</p>
        <script src="/main.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    </body>
</html>
