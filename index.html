<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>タグコレ | タグサーバーをまとめる掲示板</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="タグコレ | タグサーバーをまとめる掲示板">
        <meta property="og:description" content="β版公開。">
        <meta property="og.url" content="https://tags-collection-web.pages.dev/">

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@100;300;400;500;700;800;900&display=swap" rel="stylesheet">
        <style>*{font-family: "M PLUS Rounded 1c", sans-serif}</style>

        <link rel="stylesheet" href="/index.css">
        <script src="/func.js"></script>
        <script src="/invite.js"></script>
        <script src="/card.js"></script>
    </head>
    <body>
        <!-- 上部バー -->
        <div class="topbar d-flex justify-content-between align-items-center">
            <h3 class="m-0">タグコレ | タグサーバーをまとめる掲示板</h3>
            <input type="text" class="form-control w-25 search-box" placeholder="サーバーを検索...">
        </div>
        <h2 style="color: red;">※βなので鯖は適当です</h2>

        <!-- カテゴリ -->
        <div class="p-3" id="cat">
            分類
            <button class="category-btn active">すべて</button>
            <button class="category-btn">通常</button>
            <button class="category-btn">参加申請</button>
            <!--<button class="category-btn">危険</button>-->
        </div>
        <!-- カテゴリ -->
        <div class="p-3" id="lang-cat">
            言語
            <button class="category-btn active">すべて</button>
            <button class="category-btn">日本語</button>
            <button class="category-btn">英語</button>
            <button class="category-btn">中国語</button>
        </div>

        <!-- サーバー一覧 -->
        <div class="container">
            <div class="row g-4 servers">
            </div>
        </div>
        <script src="/main.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    </body>
</html>
